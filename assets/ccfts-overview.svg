<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-label="CCFTS overview">
  <rect width="1200" height="560" fill="#f7f8fa"/>
  <text x="60" y="70" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="34" font-weight="700" fill="#1f2937">CCFTS 解决的问题</text>
  <text x="60" y="112" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" fill="#4b5563">让 AI 不只是会写材料，而是先看懂施工企业的项目、合同、成本、税和报表口径</text>

  <rect x="60" y="170" width="300" height="250" rx="12" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="90" y="215" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="26" font-weight="700" fill="#111827">业务资料</text>
  <text x="90" y="260" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" fill="#374151">科目余额表</text>
  <text x="90" y="295" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" fill="#374151">合同台账</text>
  <text x="90" y="330" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" fill="#374151">发票与回款</text>
  <text x="90" y="365" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" fill="#374151">成本与结算资料</text>

  <path d="M382 295 H485" stroke="#6b7280" stroke-width="4" fill="none"/>
  <path d="M485 295 l-18 -12 v24 z" fill="#6b7280"/>

  <rect x="510" y="145" width="300" height="300" rx="16" fill="#e8f0ff" stroke="#3b82f6" stroke-width="3"/>
  <text x="545" y="200" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#1e3a8a">CCFTS</text>
  <text x="545" y="238" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" fill="#1f2937">施工企业财税技能包</text>
  <line x1="545" y1="262" x2="775" y2="262" stroke="#93c5fd" stroke-width="2"/>
  <text x="545" y="305" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" fill="#1f2937">判断主体层级</text>
  <text x="545" y="340" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" fill="#1f2937">检查资料缺口</text>
  <text x="545" y="375" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" fill="#1f2937">按行业口径分析</text>
  <text x="545" y="410" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" fill="#1f2937">列人工复核点</text>

  <path d="M832 295 H935" stroke="#6b7280" stroke-width="4" fill="none"/>
  <path d="M935 295 l-18 -12 v24 z" fill="#6b7280"/>

  <rect x="960" y="170" width="180" height="250" rx="12" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="990" y="215" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="26" font-weight="700" fill="#111827">AI 输出</text>
  <text x="990" y="260" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" fill="#374151">分析草稿</text>
  <text x="990" y="295" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" fill="#374151">风险提示</text>
  <text x="990" y="330" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" fill="#374151">复核清单</text>
  <text x="990" y="365" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" fill="#374151">处理步骤</text>

  <rect x="255" y="465" width="690" height="54" rx="10" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="285" y="500" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700" fill="#9a3412">注意：AI 输出不是正式意见，必须由财务、税务、审计或管理人员复核。</text>
</svg>
