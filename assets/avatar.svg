<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9984a"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4af6a"/>
      <stop offset="100%" stop-color="#a07828"/>
    </linearGradient>
  </defs>

  <!-- 圆形背景 -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- 外圈金边 -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.6"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#gold)" stroke-width="0.5" opacity="0.3"/>

  <!-- 塔吊剪影 -->
  <g transform="translate(180, 80)" fill="url(#goldLight)" opacity="0.9">
    <!-- 塔身竖柱 -->
    <rect x="72" y="30" width="8" height="280" rx="2"/>
    <!-- 横梁 / 吊臂 -->
    <rect x="20" y="40" width="160" height="7" rx="2"/>
    <!-- 吊臂拉索 -->
    <line x1="76" y1="30" x2="20" y2="45" stroke="url(#goldLight)" stroke-width="3" stroke-linecap="round"/>
    <!-- 塔尖 -->
    <polygon points="76,0 76,30 80,30 80,0"/>
    <!-- 配重臂 -->
    <rect x="140" y="47" width="50" height="5" rx="2"/>
    <!-- 吊钩 -->
    <line x1="35" y1="47" x2="35" y2="90" stroke="url(#goldLight)" stroke-width="2"/>
    <path d="M30,90 L40,90 L38,100 L32,100 Z" fill="url(#goldLight)"/>
    <!-- 驾驶室 -->
    <rect x="68" y="70" width="16" height="12" rx="2"/>
  </g>

  <!-- 桥梁剪影 -->
  <g transform="translate(260, 200)" fill="url(#gold)" opacity="0.7">
    <!-- 桥面 -->
    <rect x="0" y="60" width="200" height="8" rx="3"/>
    <!-- 桥墩左 -->
    <rect x="25" y="68" width="18" height="120" rx="3"/>
    <!-- 桥墩右 -->
    <rect x="155" y="68" width="18" height="120" rx="3"/>
    <!-- 缆索左 -->
    <path d="M25,68 Q60,20 100,68" fill="none" stroke="url(#gold)" stroke-width="3"/>
    <!-- 缆索右 -->
    <path d="M200,68 Q140,20 100,68" fill="none" stroke="url(#gold)" stroke-width="3"/>
    <!-- 索塔 -->
    <rect x="95" y="20" width="10" height="48" rx="2"/>
    <!-- 竖索 -->
    <line x1="50" y1="68" x2="60" y2="38" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
    <line x1="70" y1="68" x2="75" y2="30" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
    <line x1="130" y1="68" x2="125" y2="30" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
    <line x1="150" y1="68" x2="140" y2="38" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- 财税K线/图表 -->
  <g transform="translate(70, 370)" fill="none" stroke="url(#goldLight)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8">
    <!-- 折线图 -->
    <polyline points="0,40 40,30 80,45 120,10 160,20 200,5"/>
    <!-- 柱状 -->
    <rect x="220" y="25" width="18" height="20" fill="url(#goldLight)" stroke="none" rx="2" opacity="0.6"/>
    <rect x="245" y="10" width="18" height="35" fill="url(#goldLight)" stroke="none" rx="2" opacity="0.8"/>
    <rect x="270" y="20" width="18" height="25" fill="url(#goldLight)" stroke="none" rx="2" opacity="0.7"/>
    <rect x="295" y="5"  width="18" height="40" fill="url(#goldLight)" stroke="none" rx="2" opacity="0.9"/>
    <!-- 横轴 -->
    <line x1="0" y1="45" x2="320" y2="45" stroke="url(#goldLight)" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- CCFTS 文字 -->
  <text x="256" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" letter-spacing="6" fill="url(#goldLight)" opacity="0.9">CCFTS</text>
</svg>
