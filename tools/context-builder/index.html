<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CCFTS 背景包生成器</title>
  <style>
    :root {
      color-scheme: light;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #d1d5db;
      --soft: #f9fafb;
      --primary: #166534;
      --primary-dark: #14532d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #ffffff;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", "Segoe UI", sans-serif;
      line-height: 1.6;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 24px;
    }

    header {
      margin-bottom: 24px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 16px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.3;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 0.9fr);
      gap: 24px;
      align-items: start;
    }

    form,
    .result-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
    }

    form {
      padding: 20px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--text);
      font: inherit;
      padding: 9px 10px;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: 2px solid rgba(22, 101, 52, 0.18);
      border-color: var(--primary);
    }

    .hint {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    button {
      border: 1px solid var(--primary);
      border-radius: 6px;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      padding: 9px 16px;
    }

    .primary {
      background: var(--primary);
      color: #ffffff;
    }

    .primary:hover {
      background: var(--primary-dark);
    }

    .secondary {
      background: #ffffff;
      color: var(--primary);
    }

    .secondary:hover {
      background: var(--soft);
    }

    .result-panel {
      padding: 20px;
      position: sticky;
      top: 16px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 20px;
      line-height: 1.35;
    }

    #result {
      width: 100%;
      min-height: 430px;
      margin: 0;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--soft);
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 14px;
      line-height: 1.7;
    }

    .message {
      min-height: 22px;
      margin: 10px 0 0;
      color: var(--primary);
      font-size: 14px;
    }

    footer {
      margin-top: 24px;
      border-top: 1px solid var(--line);
      padding-top: 12px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    @media (max-width: 820px) {
      main {
        width: min(100% - 24px, 680px);
        padding-top: 20px;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .result-panel {
        position: static;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>CCFTS 背景包生成器</h1>
      <p class="lead">填写你的岗位、单位口径和本次任务，生成一段可以直接粘贴给 AI 的背景资料。</p>
    </header>

    <div class="layout">
      <form id="context-form">
        <div class="field">
          <label for="role">我的岗位</label>
          <input id="role" name="role" type="text" placeholder="例如：项目财务、总部报表岗、税务岗">
        </div>

        <div class="field">
          <label for="level">单位层级</label>
          <select id="level" name="level">
            <option>央企集团总部</option>
            <option>子公司</option>
            <option>分公司</option>
            <option>项目部</option>
            <option>项目公司</option>
            <option>其他</option>
          </select>
        </div>

        <div class="field">
          <label for="project-type">主要项目类型</label>
          <select id="project-type" name="projectType">
            <option>房建</option>
            <option>基础设施</option>
            <option>市政</option>
            <option>工业厂房</option>
            <option>国际工程</option>
            <option>混合</option>
          </select>
        </div>

        <div class="field">
          <label for="tax-method">计税方式</label>
          <select id="tax-method" name="taxMethod">
            <option>一般计税</option>
            <option>简易计税</option>
            <option>混合</option>
            <option>不确定</option>
          </select>
        </div>

        <div class="field">
          <label for="cross-province">是否跨省施工</label>
          <select id="cross-province" name="crossProvince">
            <option>是</option>
            <option>否</option>
            <option>部分项目是</option>
          </select>
        </div>

        <div class="field">
          <label for="period">本次处理的期间</label>
          <input id="period" name="period" type="text" placeholder="例如：2025年4月">
        </div>

        <div class="field">
          <label for="task">本次任务描述</label>
          <textarea id="task" name="task" placeholder="例如：整理三个项目的月度快报"></textarea>
        </div>

        <div class="field">
          <label for="special-rules">特殊口径说明</label>
          <textarea id="special-rules" name="specialRules" placeholder="选填。例如：本公司分包扣除口径与集团口径不同"></textarea>
          <p class="hint">没有特殊口径可以不填。</p>
        </div>

        <div class="field">
          <label for="review-boundary">人工复核边界</label>
          <textarea id="review-boundary" name="reviewBoundary" placeholder="选填。例如：所有税务结论须经税务部门确认后方可使用"></textarea>
          <p class="hint">建议写清哪些结论必须由财务、税务、商务、法务或领导复核。</p>
        </div>

        <div class="actions">
          <button class="primary" type="submit">生成背景包</button>
          <button class="secondary" id="copy-button" type="button">复制</button>
        </div>
      </form>

      <section class="result-panel" aria-labelledby="result-title">
        <h2 id="result-title">生成结果</h2>
        <pre id="result">请先填写左侧信息，然后点击“生成背景包”。</pre>
        <p class="message" id="message" aria-live="polite"></p>
      </section>
    </div>

    <footer>本工具在本地浏览器运行，不上传任何数据</footer>
  </main>

  <script>
    (function () {
      var form = document.getElementById("context-form");
      var result = document.getElementById("result");
      var message = document.getElementById("message");
      var copyButton = document.getElementById("copy-button");

      function value(id, fallback) {
        var element = document.getElementById(id);
        var text = element.value.trim();
        return text || fallback;
      }

      function buildContextPack() {
        return [
          "【CCFTS 背景包】",
          "岗位：" + value("role", "未填写"),
          "单位层级：" + value("level", "未填写"),
          "项目类型：" + value("project-type", "未填写"),
          "计税方式：" + value("tax-method", "未填写"),
          "跨省施工：" + value("cross-province", "未填写"),
          "处理期间：" + value("period", "未填写"),
          "本次任务：" + value("task", "未填写"),
          "特殊口径：" + value("special-rules", "未填写"),
          "人工复核边界：" + value("review-boundary", "未填写"),
          "",
          "使用说明：将此背景包连同 CCFTS 场景包和脱敏资料一起提交给 AI。AI 输出后须按人工复核边界中说明的范围进行人工确认。"
        ].join("\n");
      }

      function setMessage(text) {
        message.textContent = text;
        if (text) {
          window.setTimeout(function () {
            message.textContent = "";
          }, 2200);
        }
      }

      function fallbackCopy(text) {
        var textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.select();
        try {
          document.execCommand("copy");
          setMessage("已复制。");
        } catch (error) {
          setMessage("复制失败，请手动选中生成结果复制。");
        }
        document.body.removeChild(textarea);
      }

      form.addEventListener("submit", function (event) {
        event.preventDefault();
        result.textContent = buildContextPack();
        setMessage("背景包已生成。");
      });

      copyButton.addEventListener("click", function () {
        var text = result.textContent.trim();
        if (!text || text.indexOf("请先填写") === 0) {
          text = buildContextPack();
          result.textContent = text;
        }

        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function () {
            setMessage("已复制。");
          }).catch(function () {
            fallbackCopy(text);
          });
          return;
        }

        fallbackCopy(text);
      });
    }());
  </script>
</body>
</html>
